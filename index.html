<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Date Invitation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-decorations">
        <!-- Decoration images -->
        <img src="img/jellyfish.png" class="decor jellyfish" alt="Jellyfish">
        <img src="img/lily.png" class="decor lily" alt="Lily">
        <img src="img/spider_lily.png" class="decor spider-lily" alt="Spider Lily">
    </div>

    <main class="glass-card">
        <div id="step-1" class="step active">
            <h1>Mi amor,</h1>
            <h2 class="question">Would you like to go on a date with me? 💜</h2>
            
            <p class="subtitle">Choose what you'd like most:</p>
            
            <div class="options-container">
                <button class="date-option" onclick="selectDateType('Car Date', 'car')">
                    <span class="icon">🚗</span>
                    <span class="text">Car Date</span>
                </button>
                <button class="date-option" onclick="selectDateType('Fancy Date', 'fancy')">
                    <span class="icon">✨</span>
                    <span class="text">Fancy Date</span>
                </button>
            </div>
        </div>

        <div id="step-2-car" class="step hidden">
            <h2 class="question">Yay, a Car Date! 🚗</h2>
            <p class="subtitle">What should we eat?</p>
            <div class="food-options-container">
                <button class="food-option" onclick="selectFood('Popeyes')">🍗 Popeyes</button>
                <button class="food-option" onclick="selectFood('Pizza Hut')">🍕 Pizza Hut</button>
                <button class="food-option" onclick="selectFood('Dumplings')">🥟 Dumplings</button>
                <button class="food-option" onclick="selectFood('A mix of everything')">🥡 A mix of everything!</button>
            </div>
        </div>

        <div id="step-2-fancy" class="step hidden">
            <h2 class="question">Ooh, a Fancy Date! ✨</h2>
            <p class="subtitle">Where should we go?</p>
            <div class="food-options-container">
                <button class="food-option" onclick="selectFood('Ace Restaurant')">🍷 Ace Restaurant</button>
                <button class="food-option" onclick="selectFood('JC Cafe')">☕ JC Cafe</button>
                <button class="food-option" onclick="selectFood('Sancesy')">🍽️ Sancesy</button>
                <button class="food-option" onclick="selectFood('Hotpot')">🍲 Hotpot</button>
            </div>
        </div>

        <div id="step-3" class="step hidden">
            <h2 class="question" style="margin-bottom: 1rem;">Perfect! 🥰</h2>
            <p id="response-title">I can't wait for our <span id="chosen-date"></span> with <span id="chosen-food"></span>!</p>
            <div style="margin: 2rem 0;">
                <p class="note" style="font-size: 1.1rem;">Time and day are to be discussed.</p>
            </div>
        </div>
    </main>

    <script>
        let selectedDateTypeStr = '';

        function selectDateType(option, type) {
            selectedDateTypeStr = option;
            
            // Hide step 1
            const step1 = document.getElementById('step-1');
            step1.classList.remove('active');
            
            setTimeout(() => {
                step1.classList.add('hidden');
                
                // Show step 2 depending on choice
                if(type === 'car') {
                    const step2 = document.getElementById('step-2-car');
                    step2.classList.remove('hidden');
                    setTimeout(() => step2.classList.add('active'), 50);
                } else {
                    const step2 = document.getElementById('step-2-fancy');
                    step2.classList.remove('hidden');
                    setTimeout(() => step2.classList.add('active'), 50);
                }
            }, 400); // Wait for transition out
        }

        function selectFood(food) {
            // Hide all step 2s
            document.querySelectorAll('.step').forEach(el => {
                el.classList.remove('active');
            });

            // Update text
            document.getElementById('chosen-date').textContent = selectedDateTypeStr;
            document.getElementById('chosen-food').textContent = food;

            // Show step 3 after transition
            setTimeout(() => {
                document.querySelectorAll('.step').forEach(el => el.classList.add('hidden'));
                
                const step3 = document.getElementById('step-3');
                step3.classList.remove('hidden');
                setTimeout(() => step3.classList.add('active'), 50);
            }, 400);
        }
    </script>
</body>
</html>
